---
name: build

# Build the OpenUSD runtime natively per triplet and publish the prebuilt
# archives. Each runner builds its own target (OpenUSD has no cross-compile
# path); on a v26.05.* tag the archives + checksum.txt are attached to a release.

# OpenUSD from source is ~40+ min per triplet, so this is manual / tag-driven
# rather than on every push.
on:
    push:
        # dev→beta→rc→release tag progression (v<x>.<y>.<z>[-<stage>.<n>]).
        tags: ['v*']
    workflow_dispatch:

env:
    OTP_VERSION: '27'
    ELIXIR_VERSION: '1.18'

jobs:
    build:
        name: ${{ matrix.target }}
        runs-on: ${{ matrix.os }}
        timeout-minutes: 120
        strategy:
            fail-fast: false
            matrix:
                include:
                    - os: ubuntu-latest
                      target: x86_64-linux-gnu
                    - os: macos-latest
                      target: aarch64-apple-darwin
                    - os: windows-2022
                      target: x86_64-windows-msvc
                    # llvm-mingw (GNU ABI) usd_ms for mingw consumers (cloth-fit).
                    - os: windows-2022
                      target: x86_64-windows-gnu
        env:
            OPENUSD_BUILD: '1'
            OPENUSD_TARGET: ${{ matrix.target }}
            OPENUSD_CACHE_DIR: ${{ github.workspace }}/dist
            SCCACHE_GHA_ENABLED: 'true'
            USE_SCCACHE: '1'
        steps:
            - uses: actions/checkout@v4

            - uses: erlef/setup-beam@v1
              with: { otp-version: '${{ env.OTP_VERSION }}', elixir-version: '${{ env.ELIXIR_VERSION }}' }

            - uses: actions/setup-python@v5
              with: { python-version: '3.12' }

            - name: Install CMake (Linux)
              if: runner.os == 'Linux'
              run: sudo apt-get update && sudo apt-get install -y cmake

            - name: Set up sccache
              uses: mozilla-actions/sccache-action@9e7fa8a12102821edf02ca5dbea1acd0f89a2696

            # The -gnu target builds with llvm-mingw (clang + mingw32-make). Pull
            # the official release directly (it bundles mingw32-make); this is the
            # exact toolchain the -gnu recipe was validated against.
            - name: Set up llvm-mingw
              if: endsWith(matrix.target, 'windows-gnu')
              shell: pwsh
              run: |
                  $ver = "20260616"
                  $url = "https://github.com/mstorsjo/llvm-mingw/releases/download/$ver/llvm-mingw-$ver-ucrt-x86_64.zip"
                  Invoke-WebRequest $url -OutFile "$env:RUNNER_TEMP\llvm-mingw.zip"
                  Expand-Archive "$env:RUNNER_TEMP\llvm-mingw.zip" -DestinationPath "C:\" -Force
                  Add-Content $env:GITHUB_PATH "C:\llvm-mingw-$ver-ucrt-x86_64\bin"

            - name: Build OpenUSD runtime
              shell: bash
              run: |
                  set -euo pipefail
                  mix local.hex --force && mix local.rebar --force
                  mix deps.get
                  mix compile

            - name: Locate archive
              id: arc
              shell: bash
              run: echo "path=dist/openusd-${OPENUSD_VERSION:-26.05}-${{ matrix.target }}.tar.gz" >> "$GITHUB_OUTPUT"

            - uses: actions/upload-artifact@v4
              with:
                  name: openusd-${{ matrix.target }}
                  path: dist/openusd-*-${{ matrix.target }}.tar.gz
                  if-no-files-found: error

    release:
        name: Release
        needs: build
        if: startsWith(github.ref, 'refs/tags/v')
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - uses: erlef/setup-beam@v1
              with: { otp-version: '${{ env.OTP_VERSION }}', elixir-version: '${{ env.ELIXIR_VERSION }}' }

            - uses: actions/download-artifact@v4
              with: { path: artifacts, merge-multiple: true }

            # Each published version downloads from "v#{version}"; enforce that the
            # tag being released is exactly that so the package can never point at a
            # release it wasn't built for.
            - name: Verify tag matches VERSION
              run: |
                  set -euo pipefail
                  want="v$(tr -d '[:space:]' < VERSION)"
                  [ "$want" = "${GITHUB_REF_NAME}" ] || { echo "tag ${GITHUB_REF_NAME} != ${want}"; exit 1; }

            # Generate checksum.txt from the exact archives just built, and copy it
            # into the repo root so the Hex package published below carries the same
            # checksums as the archives attached to this release — no desync possible,
            # reproducible build or not.
            - name: Generate checksum.txt from built archives
              run: |
                  set -euo pipefail
                  cd artifacts
                  : > checksum.txt
                  for f in openusd-*.tar.gz; do
                    echo "sha256:$(sha256sum "$f" | cut -d' ' -f1)  $f" >> checksum.txt
                  done
                  sort -o checksum.txt checksum.txt
                  cat checksum.txt
                  cp checksum.txt "$GITHUB_WORKSPACE/checksum.txt"

            - name: Publish release
              uses: softprops/action-gh-release@v2
              with:
                  files: |
                      artifacts/openusd-*.tar.gz
                      artifacts/checksum.txt

            # Idempotent: Hex releases are immutable, so re-running this job for a
            # version already on Hex (e.g. a tag re-pushed, or a manual publish done
            # out-of-band) must be a no-op, not a hard failure. Probe the Hex API for
            # the exact version and only publish when it is absent.
            - name: Publish to Hex
              env:
                  HEX_API_KEY: ${{ secrets.HEX_API_KEY }}
              run: |
                  set -euo pipefail
                  mix local.hex --force && mix local.rebar --force
                  mix deps.get
                  ver="$(tr -d '[:space:]' < VERSION)"
                  code="$(curl -fsS -o /dev/null -w '%{http_code}' \
                      "https://hex.pm/api/packages/stage_runtime/releases/${ver}" || true)"
                  if [ "$code" = "200" ]; then
                      echo "stage_runtime ${ver} is already on Hex — skipping publish (idempotent)."
                  else
                      mix hex.publish package --yes
                  fi
